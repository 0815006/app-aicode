# ===================================================
# app-aicode 全栈网站 (Vue 2 + Java 8 / Playwright)
# 通过域名或 IP:8082 以 HTTPS 方式访问
# 部署路径: /etc/nginx/conf.d/app-aicode.conf
# ===================================================

server {
    # 8082 端口走 HTTPS
    listen 8082 ssl;
    server_name realapex.site 129.211.9.238;

    # SSL 证书配置（根据实际证书路径调整）
    ssl_certificate /etc/nginx/cert/realapex.site_bundle.pem;
    ssl_certificate_key /etc/nginx/cert/realapex.site.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 文件上传大小限制（与后端保持一致）
    client_max_body_size 500m;

    # 1. 前端静态页面托管
    location / {
        root /var/www/app-aicode/dist;
        index index.html;
        try_files $uri $uri/ /index.html;  # Vue Router history 模式
    }

    # 2. 后端 API 反向代理（转发到 Docker 容器暴露的 8092 端口）
    location /api/ {
        proxy_pass http://127.0.0.1:8092/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. WebSocket（聊天室）反向代理
    location /ws/ {
        proxy_pass http://127.0.0.1:8092/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
