# ===================================================
# app-aicode 内网 Linux 摆渡代理 (流量传话筒)
# Linux 服务器 (22.188.9.15) → 反向代理回本地 Windows 开发机
# 部署路径：/etc/nginx/conf.d/nginx-aicode-dmz.conf
# 生效命令：nginx -t && nginx -s reload
# ===================================================

server {
    listen       8082;               # 外援同事访问 Linux 的端口，与腾讯云端口统一
    server_name  _;                   # 通配，无需绑定具体 IP

    # 文件上传大小限制（与后端 Spring Boot 保持一致）
    client_max_body_size 500m;

    # ========================================================
    # 1. 转发前端 Vue (Vue CLI dev server 的 8082 端口)
    # ========================================================
    location / {
        proxy_pass http://22.189.27.79:8082;  # 本地 Windows 开发机 IP

        # 保持请求头，防止前端路由、打包热更新失效
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Vue CLI 的 HMR 热更新依赖 WebSocket，必须配置
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================
    # 2. 转发后端 Java (IDE 启动的 8092 端口)
    # ========================================================
    location /api/ {
        proxy_pass http://22.189.27.79:8092/api/;  # 本地 Windows 开发机 IP

        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传超时保护（大文件上传耗时长）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # AI 流式接口必须关闭缓冲，实现打字机效果逐块传递
        proxy_buffering off;
        proxy_cache off;
    }
}
