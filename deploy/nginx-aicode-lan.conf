# ===================================================
# app-aicode 内网 Windows 本机 Nginx 配置
# 用途：在 Windows 开发机上托管前端静态文件 + 反向代理后端 API
# 部署路径：D:\app\nginx\conf\conf.d\nginx-aicode-lan.conf
# 生效命令：nginx -t && nginx -s reload
# ===================================================

server {
    listen       8082;                      # 内网统一端口，与腾讯云/摆渡端口保持一致
    server_name  _;

    # 文件上传大小限制（与后端 Spring Boot 保持一致）
    client_max_body_size 500m;

    # ========================================================
    # 1. 前端静态文件（Vue SPA History 模式）
    #    root 指向 build-web-lan.bat 产物目录 bin\aicode-web\
    #    部署时将此目录复制到 D:\app\aicode-web\ 即可
    # ========================================================
    root   D:/app/aicode-web;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;  # Vue Router history 回退
    }

    # ========================================================
    # 2. 反向代理后端 Java API
    #    后端通过 WinSW 注册为 Windows 服务，监听 8092 端口
    # ========================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8092/api/;

        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传超时保护（大文件上传耗时长）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # AI 流式接口必须关闭缓冲，实现打字机效果逐块传递
        proxy_buffering off;
        proxy_cache off;
    }
}
