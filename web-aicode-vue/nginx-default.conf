# ============================================
# docker-compose 环境下的 Nginx 配置
# 前端静态页面 + 后端 /api 反向代理 -> aicode-server:8092
# ============================================
server {
    listen 80;
    server_name localhost;

    # 文件上传大小限制（与后端 Spring Boot 保持一致）
    client_max_body_size 500m;

    # 1. 前端静态页面
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # Vue Router history 模式
    }

    # 2. 后端 API 反向代理 -> docker-compose 网络内的 app 容器
    location /api/ {
        proxy_pass http://app:8092/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传超时保护（大文件上传耗时长）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # 3. WebSocket (聊天室) 反向代理
    location /ws/ {
        proxy_pass http://app:8092/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
