<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 工具箱主体 -->
  <rect x="6" y="24" width="52" height="36" rx="4" fill="#409EFF" stroke="#337ECC" stroke-width="2"/>
  <!-- 工具箱中间分隔线 -->
  <line x1="6" y1="44" x2="58" y2="44" stroke="#337ECC" stroke-width="2"/>
  <!-- 工具箱提手 -->
  <path d="M22 24 L22 14 Q22 8 32 8 Q42 8 42 14 L42 24" fill="none" stroke="#337ECC" stroke-width="3" stroke-linecap="round"/>
  <!-- 锁扣 -->
  <rect x="26" y="44" width="12" height="6" rx="2" fill="#FFD04B" stroke="#E6A23C" stroke-width="1.5"/>
  <!-- 左侧：扳手 -->
  <g transform="translate(16, 30)" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" fill="none">
    <circle cx="6" cy="4" r="5"/>
    <line x1="10" y1="8" x2="16" y2="14"/>
    <line x1="3" y1="1" x2="9" y2="7" stroke-width="1.5"/>
  </g>
  <!-- 右侧：螺丝刀 -->
  <g transform="translate(40, 30)" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="8" y1="2" x2="8" y2="11"/>
    <rect x="5" y="11" width="6" height="3" rx="1" fill="#FFF" stroke="none"/>
  </g>
</svg>
