server:
  port: ${SERVER_PORT:8092}
  tomcat:
    accesslog:
      enabled: true
      directory: logs
      prefix: access_log
      suffix: .log
      pattern: "%h %l %u %t \"%r\" %s %b \"%{User-Agent}i\""

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:500MB}
      max-request-size: ${FILE_MAX_SIZE:500MB}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stack_db}?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF8&serverTimezone=GMT%2B8&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&rewriteBatchedStatements=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.bocfintech.allstar.entity
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.bocfintech.allstar: debug
    org.springframework.web.socket: debug
    com.bocfintech.allstar.mapper: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# =============================================
# AICode 自定义配置
# 所有路径可通过 DATA_ROOT 环境变量统一覆盖，
# 适配 Windows 本地开发 / Docker / 腾讯云 三种部署环境
# =============================================
app:
  data-root: ${DATA_ROOT:D:/data/aicode-v1}
  crawl:
    image-base-path: "${app.data-root}/crawl/images/"
    video-base-path: "${app.data-root}/crawl/videos/"

vote:
  upload-path: "${app.data-root}/uploads/vote/"
text-extract:
  upload-path: "${app.data-root}/uploads/text-extract/"
chat:
  upload-path: "${app.data-root}/uploads/chat/"
performance:
  template-path: "${app.data-root}/uploads/performance/templates/"
  doc-path: "${app.data-root}/uploads/performance/docs/"

# 造数引擎
meta:
  max-file-lines: 2000
  storage:
    preview: "${app.data-root}/meta/preview/"
    formal: "${app.data-root}/meta/normal/"
  template-path: "${app.data-root}/meta/templates/"
  ref-file-path: "${app.data-root}/meta/ref-files/"

# Playwright / Chrome 配置
# 内网桌面环境使用系统 Chrome + CDP；Docker 环境由 Playwright 自行管理浏览器
chrome:
  executable-path: ${CHROME_EXECUTABLE_PATH:C:\\Users\\chendong\\AppData\\Local\\ms-playwright\\chromium-1097\\chrome-win\\chrome.exe}
  port: ${CHROME_CDP_PORT:9222}
  user-data-dir: ${CHROME_USER_DATA_DIR:C:\\chrome_dev_profile}
